<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Organizer – Add Course</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ======= HEADER ======= -->
  <header>
    <div class="header-inner">
      <div class="logo">&#127979; Course<span>Hub</span></div>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <nav>
        <ul id="navMenu">
          <li><a href="index.html">Home</a></li>
          <li><a href="courses.html">My Courses</a></li>
          <li><a href="add-course.html" class="active">Add Course</a></li>
          <li><a href="contact.html">Contact Us</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ======= MAIN ======= -->
  <main>
    <h1 class="page-title fade-in">Add a New Course</h1>
    <p class="page-subtitle">Fill in the details below to add a course to your organizer.</p>

    <section>
      <div class="form-card fade-in">
        <form id="addCourseForm" novalidate>

          <!-- Course Name -->
          <div class="form-group">
            <label for="courseName">Course Name</label>
            <input
              type="text"
              id="courseName"
              name="courseName"
              placeholder="e.g. Internet Technology"
              required
            />
          </div>

          <!-- Instructor + Credit Hours (side by side) -->
          <div class="form-row">
            <div class="form-group">
              <label for="instructor">Instructor</label>
              <input
                type="text"
                id="instructor"
                name="instructor"
                placeholder="e.g. Dr. Ahmed Hassan"
                required
              />
            </div>
            <div class="form-group">
              <label for="creditHours">Credit Hours</label>
              <select id="creditHours" name="creditHours" required>
                <option value="" disabled selected>Select hours</option>
                <option value="1">1 Hour</option>
                <option value="2">2 Hours</option>
                <option value="3">3 Hours</option>
                <option value="4">4 Hours</option>
              </select>
            </div>
          </div>

          <!-- Status -->
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status">
              <option value="ongoing">Ongoing</option>
              <option value="completed">Completed</option>
              <option value="pending">Pending Exam</option>
            </select>
          </div>

          <!-- Notes -->
          <div class="form-group">
            <label for="notes">Notes</label>
            <textarea
              id="notes"
              name="notes"
              placeholder="Any additional info about this course..."
            ></textarea>
          </div>

          <!-- Actions -->
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Course</button>
            <button type="reset" class="btn btn-secondary">Clear</button>
          </div>

        </form>

        <!-- Success message (hidden by default) -->
        <div id="successMsg" style="display:none; margin-top:1.2rem; padding:1rem 1.2rem;
             background:#d4f0e0; border-radius:8px; color:#1a6b3c; font-weight:500;">
          ✅ Course added successfully! <a href="courses.html" style="color:#1a4a7a; text-decoration:underline;">View all courses →</a>
        </div>
      </div>
    </section>
  </main>

  <!-- ======= FOOTER ======= -->
  <footer>
    <p>&copy; 2026 <strong>CourseHub</strong> — Built for Internet Technology, Helwan University</p>
  </footer>

  <script>
    // Mobile nav
    const toggle = document.getElementById('menuToggle');
    const menu   = document.getElementById('navMenu');
    toggle.addEventListener('click', () => menu.classList.toggle('open'));

    // Form submit feedback
    const form = document.getElementById('addCourseForm');
    const msg  = document.getElementById('successMsg');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const name       = document.getElementById('courseName').value.trim();
      const instructor = document.getElementById('instructor').value.trim();
      const hours      = document.getElementById('creditHours').value;

      if (!name || !instructor || !hours) {
        alert('Please fill in all required fields.');
        return;
      }

      msg.style.display = 'block';
      form.reset();
      msg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  </script>

</body>
</html>
